<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Successful - SyncStation</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f11;
    --surface: #18181c;
    --border: #2e2e38;
    --accent: #ff6b35;
    --text: #f0f0f4;
    --muted: #8888a0;
    --success: #4ade80;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .container {
    max-width: 500px;
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px 40px;
    text-align: center;
  }

  .icon {
    width: 80px;
    height: 80px;
    margin: 0 auto 24px;
    background: rgba(74, 222, 128, 0.15);
    border: 2px solid rgba(74, 222, 128, 0.3);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
  }

  h1 {
    font-size: 28px;
    font-weight: 600;
    margin-bottom: 12px;
  }

  .subtitle {
    font-size: 16px;
    color: var(--muted);
    margin-bottom: 32px;
  }

  .details {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 32px;
    text-align: left;
  }

  .detail-row {
    display: flex;
    justify-content: space-between;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }

  .detail-row:last-child {
    border-bottom: none;
  }

  .detail-label {
    font-size: 14px;
    color: var(--muted);
  }

  .detail-value {
    font-size: 14px;
    font-weight: 500;
    font-family: 'DM Mono', monospace;
  }

  .btn {
    display: inline-block;
    padding: 14px 32px;
    background: var(--accent);
    color: white;
    text-decoration: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 500;
    transition: all 0.15s;
  }

  .btn:hover {
    background: #ff8555;
    transform: translateY(-1px);
  }

  .loading {
    padding: 40px;
    text-align: center;
  }

  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>
</head>
<body>

<div class="container" id="content">
  <div class="loading">
    <div class="spinner"></div>
    <p style="color: var(--muted);">Verifying your payment...</p>
  </div>
</div>

<script>
  const urlParams = new URLSearchParams(window.location.search);
  const sessionId = urlParams.get('session_id');
  const portalId = urlParams.get('portalId') || localStorage.getItem('portalId');

  async function verifyPayment() {
    if (!sessionId) {
      showError('No payment session found');
      return;
    }

    try {
      const response = await fetch(`/api/paddle/session/${sessionId}`);
      const data = await response.json();

      if (data.success && data.status === 'completed') {
        showSuccess(data);
      } else if (data.status === 'open') {
        showError('Payment not completed yet. Please complete the checkout.');
      } else {
        showError(data.error || 'Payment verification failed');
      }
    } catch (err) {
      console.error('Verification error:', err);
      showError('Failed to verify payment');
    }
  }

  function showSuccess(data) {
    const finalPortalId = data.portal_id || portalId;
    const amount = data.amount ? `$${(data.amount / 100).toFixed(2)}` : 'N/A';
    
    document.getElementById('content').innerHTML = `
      <div class="icon">✓</div>
      <h1>Payment Successful!</h1>
      <p class="subtitle">Your subscription has been activated</p>
      
      <div class="details">
        <div class="detail-row">
          <span class="detail-label">Plan</span>
          <span class="detail-value">${capitalize(data.plan_tier || 'Unknown')}</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Amount</span>
          <span class="detail-value">${amount} ${data.currency || 'USD'}</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Email</span>
          <span class="detail-value">${data.customer_email || 'N/A'}</span>
        </div>
      </div>

      <a href="/settings?portalId=${finalPortalId}" class="btn">Go to Sync Rules</a>
    `;
  }

  function showError(message) {
    document.getElementById('content').innerHTML = `
      <div class="icon" style="background: rgba(248, 113, 113, 0.15); border-color: rgba(248, 113, 113, 0.3);">✕</div>
      <h1>Payment Error</h1>
      <p class="subtitle">${message}</p>
      <a href="/account?portalId=${portalId}" class="btn">Back to Account</a>
    `;
  }

  function capitalize(str) {
    if (!str) return '';
    return str.charAt(0).toUpperCase() + str.slice(1);
  }

  verifyPayment();
</script>

</body>
</html>
