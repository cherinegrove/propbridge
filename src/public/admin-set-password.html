<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Set Password - SyncStation Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f14;
  --surface: #1a1a24;
  --surface2: #25252f;
  --border: #2d2d39;
  --text: #e8e8ed;
  --muted: #9797a7;
  --accent: #ff6b35;
  --success: #4ade80;
  --error: #f87171;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'DM Sans', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 20px;
}

.container {
  width: 100%;
  max-width: 420px;
}

.logo {
  text-align: center;
  margin-bottom: 40px;
}

.logo img {
  width: 150px;
  height: 112px;
  margin-bottom: 12px;
}

.logo-subtext {
  font-size: 14px;
  color: var(--muted);
  font-weight: 500;
  letter-spacing: 0.5px;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 40px;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
}

.card-title {
  font-size: 20px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 8px;
  text-align: center;
}

.card-subtitle {
  font-size: 14px;
  color: var(--muted);
  margin-bottom: 24px;
  text-align: center;
  line-height: 1.5;
}

.form-group {
  margin-bottom: 20px;
}

.form-label {
  display: block;
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 8px;
}

.form-input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 16px;
  font-size: 15px;
  color: var(--text);
  font-family: inherit;
  transition: all 0.2s;
}

.form-input:focus {
  outline: none;
  border-color: var(--accent);
  background: var(--bg);
}

.form-hint {
  font-size: 12px;
  color: var(--muted);
  margin-top: 6px;
}

.btn {
  width: 100%;
  background: var(--accent);
  border: none;
  border-radius: 8px;
  padding: 14px 24px;
  font-size: 15px;
  font-weight: 600;
  color: white;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s;
  margin-top: 8px;
}

.btn:hover {
  background: #ff7f4d;
  transform: translateY(-1px);
}

.btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}

.message {
  padding: 12px 16px;
  border-radius: 8px;
  font-size: 14px;
  margin-bottom: 20px;
  display: none;
}

.message.show {
  display: block;
}

.message.error {
  background: rgba(248, 113, 113, 0.1);
  border: 1px solid rgba(248, 113, 113, 0.3);
  color: var(--error);
}

.message.success {
  background: rgba(74, 222, 128, 0.1);
  border: 1px solid rgba(74, 222, 128, 0.3);
  color: var(--success);
}

.password-strength {
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin-top: 8px;
  overflow: hidden;
}

.password-strength-bar {
  height: 100%;
  width: 0%;
  transition: all 0.3s;
  border-radius: 2px;
}

.password-strength-bar.weak { width: 33%; background: var(--error); }
.password-strength-bar.medium { width: 66%; background: #fb923c; }
.password-strength-bar.strong { width: 100%; background: var(--success); }

.btn.loading::after {
  content: '';
  display: inline-block;
  width: 14px;
  height: 14px;
  margin-left: 8px;
  border: 2px solid rgba(255, 255, 255, 0.3);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}
</style>
</head>
<body>

<div class="container">
  <div class="logo">
    <img src="/images/SyncStation-Centred@2x.webp" alt="SyncStation" onerror="this.style.display='none'">
    <div class="logo-subtext">ADMIN PORTAL</div>
  </div>

  <div class="card">
    <h1 class="card-title">Set Your Password</h1>
    <p class="card-subtitle">
      Welcome! Please set a secure password for your admin account.
    </p>
    
    <div class="message" id="message"></div>
    
    <form id="setPasswordForm">
      <div class="form-group">
        <label class="form-label" for="password">New Password</label>
        <input 
          type="password" 
          id="password" 
          class="form-input" 
          placeholder="Enter your password"
          required
        >
        <div class="password-strength">
          <div class="password-strength-bar" id="strengthBar"></div>
        </div>
        <div class="form-hint">Must be at least 8 characters</div>
      </div>
      
      <div class="form-group">
        <label class="form-label" for="confirmPassword">Confirm Password</label>
        <input 
          type="password" 
          id="confirmPassword" 
          class="form-input" 
          placeholder="Confirm your password"
          required
        >
      </div>
      
      <button type="submit" class="btn" id="submitBtn">
        Set Password & Sign In
      </button>
    </form>
  </div>
</div>

<script>
const form = document.getElementById('setPasswordForm');
const submitBtn = document.getElementById('submitBtn');
const message = document.getElementById('message');
const passwordInput = document.getElementById('password');
const confirmInput = document.getElementById('confirmPassword');
const strengthBar = document.getElementById('strengthBar');

// Get token from URL
const params = new URLSearchParams(window.location.search);
const token = params.get('token');

if (!token) {
  showMessage('error', 'Invalid invite link. Please contact an administrator.');
  submitBtn.disabled = true;
}

function showMessage(type, text) {
  message.textContent = text;
  message.className = `message ${type} show`;
}

function hideMessage() {
  message.classList.remove('show');
}

// Password strength indicator
passwordInput.addEventListener('input', () => {
  const password = passwordInput.value;
  let strength = 'weak';
  
  if (password.length >= 12 && /[A-Z]/.test(password) && /[0-9]/.test(password) && /[^A-Za-z0-9]/.test(password)) {
    strength = 'strong';
  } else if (password.length >= 8) {
    strength = 'medium';
  }
  
  strengthBar.className = `password-strength-bar ${strength}`;
});

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  hideMessage();
  
  const password = passwordInput.value;
  const confirmPassword = confirmInput.value;
  
  if (password.length < 8) {
    showMessage('error', 'Password must be at least 8 characters');
    return;
  }
  
  if (password !== confirmPassword) {
    showMessage('error', 'Passwords do not match');
    return;
  }
  
  submitBtn.disabled = true;
  submitBtn.classList.add('loading');
  submitBtn.textContent = 'Setting password';
  
  try {
    const response = await fetch('/admin/auth/accept-invite', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, password })
    });
    
    const data = await response.json();
    
    if (response.ok) {
      showMessage('success', 'Password set! Redirecting to login...');
      setTimeout(() => {
        window.location.href = '/admin/auth/login';
      }, 1500);
    } else {
      showMessage('error', data.error || 'Failed to set password');
      submitBtn.disabled = false;
      submitBtn.classList.remove('loading');
      submitBtn.textContent = 'Set Password & Sign In';
    }
  } catch (err) {
    showMessage('error', 'Network error. Please try again.');
    submitBtn.disabled = false;
    submitBtn.classList.remove('loading');
    submitBtn.textContent = 'Set Password & Sign In';
  }
});

passwordInput.focus();
</script>

</body>
</html>
