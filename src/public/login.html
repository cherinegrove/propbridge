<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - SyncStation</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 420px;
            width: 100%;
            padding: 40px;
        }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo h1 { color: #2563eb; font-size: 32px; margin-bottom: 8px; }
        .logo p  { color: #6b7280; font-size: 14px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #374151; font-weight: 500; font-size: 14px; }
        input {
            width: 100%; padding: 12px 15px; border: 2px solid #e5e7eb;
            border-radius: 8px; font-size: 14px; transition: all 0.3s;
        }
        input:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        .btn {
            width: 100%; padding: 12px; background: #2563eb; color: white;
            border: none; border-radius: 8px; font-size: 16px; font-weight: 600;
            cursor: pointer; transition: all 0.3s; margin-top: 4px;
        }
        .btn:hover    { background: #1d4ed8; transform: translateY(-1px); }
        .btn:disabled { background: #9ca3af; cursor: not-allowed; transform: none; }
        .links { margin-top: 20px; text-align: center; font-size: 14px; }
        .links a { color: #2563eb; text-decoration: none; }
        .links a:hover { text-decoration: underline; }
        .links .sep { color: #d1d5db; margin: 0 8px; }
        .alert { padding: 12px 15px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; }
        .alert-error   { background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; }
        .alert-success { background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; }
        .alert-info    { background: #eff6ff; border: 1px solid #bfdbfe; color: #1e40af; }
        .loading { text-align: center; padding: 20px; color: #6b7280; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <h1>SyncStation</h1>
            <p>Sign in to your account</p>
        </div>

        <div id="alertContainer"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" required autocomplete="email" placeholder="you@company.com">
            </div>
            <div class="form-group">
                <label for="password">
                    Password
                    <a href="/forgot-password" style="float:right;font-weight:400;color:#2563eb;font-size:12px">Forgot password?</a>
                </label>
                <input type="password" id="password" required placeholder="Your password">
            </div>
            <button type="submit" class="btn" id="loginBtn">Sign In</button>
        </form>

        <div class="links">
            <a href="/register">Create an account</a>
        </div>
    </div>

    <script>
        const form       = document.getElementById('loginForm');
        const loginBtn   = document.getElementById('loginBtn');
        const alertBox   = document.getElementById('alertContainer');

        function showAlert(msg, type = 'error') {
            alertBox.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
        }

        // Show banners from URL params (verified=1, invited, etc.)
        const params = new URLSearchParams(window.location.search);
        if (params.get('verified') === '1') {
            showAlert('Email verified! You can now sign in.', 'success');
        } else if (params.get('invited') === '1') {
            showAlert('You\'ve been invited to a portal. Sign in to accept.', 'info');
        } else if (params.get('error')) {
            showAlert(decodeURIComponent(params.get('error')));
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email    = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            loginBtn.disabled    = true;
            loginBtn.textContent = 'Signing in...';
            alertBox.innerHTML   = '';

            try {
                const res  = await fetch('/api/auth/login', {
                    method:  'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body:    JSON.stringify({ email, password })
                });
                const data = await res.json();

                if (!res.ok) throw new Error(data.error || 'Login failed');

                // ── Routing logic ───────────────────────────────────────────
                // If user has no portals yet, send them to connect HubSpot first
                if (!data.hasPortal) {
                    loginBtn.textContent = 'Redirecting to HubSpot...';
                    showAlert('Account verified! Now connect your HubSpot portal to continue.', 'info');
                    setTimeout(() => {
                        window.location.href = '/oauth/install';
                    }, 1500);
                    return;
                }

                // If user has one portal, go straight to settings
                if (data.portals && data.portals.length === 1) {
                    window.location.href = `/settings?portalId=${data.portalId}`;
                    return;
                }

                // Multiple portals — go to portal picker (or just use first)
                window.location.href = `/settings?portalId=${data.portalId}`;

            } catch (err) {
                showAlert(err.message);
                loginBtn.disabled    = false;
                loginBtn.textContent = 'Sign In';
            }
        });
    </script>
</body>
</html>
