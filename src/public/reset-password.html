<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - SyncStation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 450px;
            width: 100%;
            padding: 40px;
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo h1 {
            color: #2563eb;
            font-size: 32px;
            margin-bottom: 8px;
        }
        
        .logo p {
            color: #6b7280;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #374151;
            font-weight: 500;
            font-size: 14px;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }
        
        .password-requirements {
            font-size: 12px;
            color: #6b7280;
            margin-top: 8px;
        }
        
        .password-requirements ul {
            margin: 5px 0 0 20px;
        }
        
        .password-requirements li {
            margin: 3px 0;
        }
        
        .password-requirements li.valid {
            color: #10b981;
        }
        
        .btn {
            width: 100%;
            padding: 12px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn:hover {
            background: #1d4ed8;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.4);
        }
        
        .btn:disabled {
            background: #9ca3af;
            cursor: not-allowed;
            transform: none;
        }
        
        .links {
            margin-top: 20px;
            text-align: center;
        }
        
        .links a {
            color: #2563eb;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
        }
        
        .links a:hover {
            color: #1d4ed8;
            text-decoration: underline;
        }
        
        .alert {
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        
        .alert-error {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #991b1b;
        }
        
        .alert-success {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            color: #166534;
        }
        
        .success-container {
            text-align: center;
        }
        
        .success-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>SyncStation</h1>
            <p>Set Your New Password</p>
        </div>
        
        <div id="alertContainer"></div>
        
        <!-- Reset Form -->
        <div id="resetForm">
            <form id="resetPasswordForm">
                <div class="form-group">
                    <label for="newPassword">New Password</label>
                    <input 
                        type="password" 
                        id="newPassword" 
                        name="newPassword" 
                        required
                        placeholder="Enter new password"
                    >
                    <div class="password-requirements">
                        <strong>Password must:</strong>
                        <ul id="requirements">
                            <li id="req-length">Be at least 8 characters long</li>
                            <li id="req-uppercase">Include an uppercase letter</li>
                            <li id="req-lowercase">Include a lowercase letter</li>
                            <li id="req-number">Include a number</li>
                        </ul>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input 
                        type="password" 
                        id="confirmPassword" 
                        name="confirmPassword" 
                        required
                        placeholder="Confirm new password"
                    >
                </div>
                
                <button type="submit" class="btn" id="submitBtn" disabled>
                    Reset Password
                </button>
            </form>
        </div>
        
        <!-- Success Message -->
        <div id="successMessage" class="success-container hidden">
            <div class="success-icon">✅</div>
            <h2>Password Reset Successful!</h2>
            <p style="color: #6b7280; margin: 20px 0;">
                Your password has been updated. You can now login with your new password.
            </p>
            <a href="/login" class="btn">Go to Login</a>
        </div>
    </div>
    
    <script>
        const form = document.getElementById('resetPasswordForm');
        const submitBtn = document.getElementById('submitBtn');
        const alertContainer = document.getElementById('alertContainer');
        const resetForm = document.getElementById('resetForm');
        const successMessage = document.getElementById('successMessage');
        const newPasswordInput = document.getElementById('newPassword');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        
        // Get token from URL
        const urlParams = new URLSearchParams(window.location.search);
        const resetToken = urlParams.get('token');
        
        if (!resetToken) {
            showAlert('Invalid or missing reset token. Please request a new password reset link.', 'error');
            submitBtn.disabled = true;
        }
        
        // Password validation
        const requirements = {
            length: false,
            uppercase: false,
            lowercase: false,
            number: false
        };
        
        function validatePassword(password) {
            requirements.length = password.length >= 8;
            requirements.uppercase = /[A-Z]/.test(password);
            requirements.lowercase = /[a-z]/.test(password);
            requirements.number = /[0-9]/.test(password);
            
            // Update UI
            document.getElementById('req-length').classList.toggle('valid', requirements.length);
            document.getElementById('req-uppercase').classList.toggle('valid', requirements.uppercase);
            document.getElementById('req-lowercase').classList.toggle('valid', requirements.lowercase);
            document.getElementById('req-number').classList.toggle('valid', requirements.number);
            
            return Object.values(requirements).every(r => r);
        }
        
        newPasswordInput.addEventListener('input', (e) => {
            const isValid = validatePassword(e.target.value);
            const confirmPassword = confirmPasswordInput.value;
            
            if (isValid && confirmPassword && e.target.value === confirmPassword) {
                submitBtn.disabled = false;
            } else {
                submitBtn.disabled = true;
            }
        });
        
        confirmPasswordInput.addEventListener('input', (e) => {
            const newPassword = newPasswordInput.value;
            const isValid = validatePassword(newPassword);
            
            if (isValid && newPassword === e.target.value) {
                submitBtn.disabled = false;
            } else {
                submitBtn.disabled = true;
            }
        });
        
        // Show alert
        function showAlert(message, type = 'error') {
            alertContainer.innerHTML = `
                <div class="alert alert-${type}">
                    ${message}
                </div>
            `;
        }
        
        // Handle form submission
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const newPassword = newPasswordInput.value;
            const confirmPassword = confirmPasswordInput.value;
            
            if (newPassword !== confirmPassword) {
                showAlert('Passwords do not match');
                return;
            }
            
            if (!validatePassword(newPassword)) {
                showAlert('Password does not meet requirements');
                return;
            }
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'Resetting...';
            alertContainer.innerHTML = '';
            
            try {
                const response = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        token: resetToken,
                        newPassword
                    })
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.error || 'Failed to reset password');
                }
                
                // Show success message
                resetForm.classList.add('hidden');
                successMessage.classList.remove('hidden');
                
            } catch (error) {
                showAlert(error.message);
                submitBtn.disabled = false;
                submitBtn.textContent = 'Reset Password';
            }
        });
    </script>
</body>
</html>
